services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/habidat_auth
      - REDIS_URL=redis://redis:6379
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_USERS_DN=${LDAP_USERS_DN}
      - LDAP_GROUPS_DN=${LDAP_GROUPS_DN}
      - AUTH_SECRET=${AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
    networks:
      - default
      - proxy
      - ldap
    depends_on:
      - db
      - redis
    volumes:
      - ../import:/app/import

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/habidat_auth
      - REDIS_URL=redis://redis:6379
      - LDAP_URL=${LDAP_URL}
      - LDAP_BIND_DN=${LDAP_BIND_DN}
      - LDAP_BIND_PASSWORD=${LDAP_BIND_PASSWORD}
      - LDAP_BASE_DN=${LDAP_BASE_DN}
      - LDAP_USERS_DN=${LDAP_USERS_DN}
      - LDAP_GROUPS_DN=${LDAP_GROUPS_DN}
    networks:
      - default
      - ldap
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=habidat_auth
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - default

  redis:
    image: redis:alpine
    restart: always
    networks:
      - default

networks:
  default:
  proxy:
    external: true
  ldap:
    external: true

volumes:
  db_data:
