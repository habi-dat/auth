# Development stack: DB, Redis, Mailhog + habidat-auth web app + worker
# Run from repo root: pnpm dev:docker
# Requires .env with SESSION_SECRET, BETTER_AUTH_SECRET; worker also needs LDAP_* and optional DISCOURSE_*
# Web app: http://localhost:3000  |  Mailhog UI: http://localhost:8025

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: habidat_auth
      TZ: Europe/Berlin
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - habidat-user

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      TZ: Europe/Berlin
    command: redis-server --appendonly yes
    networks:
      - habidat-user

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - habidat-user

  auth-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/habidat_auth
      REDIS_URL: redis://redis:6379
      APP_URL: https://auth.habidat.local
      NEXT_PUBLIC_APP_URL: https://auth.habidat.local
      HOSTNAME: 0.0.0.0
      VIRTUAL_HOST: auth.habidat.local
      LETSENCRYPT_HOST: auth.habidat.local
      CERT_NAME: habidat.local
      LDAP_URL: ldap://ldap:389
      TRUSTED_ORIGINS: "*.habidat.local"
      TZ: Europe/Berlin
    volumes:
      - .:/app
      - /home/florian/sources/habidat-setup/store/auth/cert/saml:/app/saml
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: sh -c "pnpm db:push && pnpm db:seed && exec pnpm dev:web"
    networks:
      - habidat-backend
      - habidat-proxy
      - habidat-user

  auth-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/habidat_auth
      REDIS_URL: redis://redis:6379
      APP_URL: https://auth.habidat.local
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_FROM: dev@habidat.local
      LDAP_URL: ldap://ldap:389
      TZ: Europe/Berlin
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      mailhog: { condition: service_started }
    command: pnpm dev:worker
    volumes:
      - .:/app
    networks:
      - habidat-backend
      - habidat-user

volumes:
  postgres_data_dev:
  redis_data_dev:

networks:
  habidat-backend:
    external: true
    name: habidat-backend
  habidat-proxy:
    external: true
    name: habidat-proxy
  habidat-user: